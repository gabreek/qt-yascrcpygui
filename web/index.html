<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yaScrcpy GUI - Web</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="yaScrcpy">
    <link rel="apple-touch-icon" href="/static/icon.png">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!--THEME_CSS-->
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 1em; background-color: var(--bg); color: var(--text); }
        h2 { border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        .tab { display: flex; gap: 4px; padding: 4px; background-color: var(--panel); border-radius: 9999px; margin-bottom: 1em; width: fit-content; }
        .tab button { background: none; border: none; outline: none; cursor: pointer; padding: 8px 20px; border-radius: 9999px; font-size: 14px; font-weight: 500; color: var(--text); transition: 0.2s; white-space: nowrap; }
        .tab button:hover { background-color: color-mix(in srgb, var(--text) 10%, transparent); }
        .tab button.active { background-color: var(--primary); color: #fff; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 1em; }
        .grid-item { display: flex; flex-direction: column; align-items: center; text-align: center; background: none; padding: 0.5em; border-radius: 8px; cursor: pointer; transition: background 0.2s; height: 120px; }
        .grid-item:hover { background-color: var(--panel); }
        .icon-container { display: flex; justify-content: center; align-items: center; width: 48px; height: 48px; background-color: var(--border); border-radius: 12px; margin-bottom: 0.5em; }
        .grid-item img { width: 36px; height: 36px; border-radius: 8px; }
        .grid-item span { word-break: break-word; font-size: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .grid-section-title { font-size: 16px; margin-bottom: 0.5em; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
        .app-section-wrapper { width: 100%; padding: 0 16px 16px; }
        .tab-content { background-color: var(--panel); border: 1px solid var(--border); border-radius: 8px; }
        .tab-content-pad { padding: 16px; }
        .quick-access-wrapper { position: sticky; top: 0; z-index: 1; background-color: var(--panel); padding: 8px 16px; display: flex; justify-content: center; border-bottom: 1px solid var(--border); }
        .quick-access-wrapper .grid-container { display: flex; flex-direction: row; gap: 6px; }
        .quick-access-wrapper .grid-item { height: 40px; width: 40px; padding: 0; background: none; }
        .quick-access-wrapper .grid-item .icon-container { width: 36px; height: 36px; border-radius: 8px; margin: 0; }
        .quick-access-wrapper .grid-item img { width: 28px; height: 28px; border-radius: 6px; }
        .quick-access-wrapper .grid-item span { display: none; }
        .config-group { background-color: var(--panel); border-radius: 8px; padding: 15px; flex: 1 1 300px; min-width: 300px; }
        .config-group h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .config-item { display: flex; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .config-item > label { width: 120px; flex-shrink: 0; }
        .config-item select, .config-item input { flex: 1; min-width: 150px; padding: 8px; background-color: var(--input-bg); color: var(--text); border: 1px solid var(--input-border); border-radius: 4px; }
        .sessions-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .session-card { background-color: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; align-items: center; gap: 12px; flex: 1 1 280px; min-width: 280px; }
        .session-card img { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; }
        .session-card-info { flex: 1; min-width: 0; }
        .session-card-name { font-size: 14px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-card-meta { font-size: 12px; color: var(--text); margin-top: 2px; }
        .session-card-kill { color: var(--danger); background: none; border: none; cursor: pointer; font-size: 22px; font-weight: bold; padding: 4px 8px; border-radius: 4px; line-height: 1; flex-shrink: 0; }
        .session-card-kill:hover { background-color: color-mix(in srgb, var(--danger) 10%, transparent); }
        .config-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .config-options-grid > label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        .config-options-grid input[type="checkbox"] { width: auto; margin: 0; }
        /* Utility classes for themed colors */
        .bg-panel { background-color: var(--panel); }
        .bg-primary { background-color: var(--primary); }
        .bg-primary-hover:hover { background-color: var(--primary-hover); }
        .bg-input { background-color: var(--input-bg); }
        .text-theme { color: var(--text); }
        .text-muted { color: var(--muted); }
        .text-danger { color: var(--danger); }
        .border-panel { border-color: var(--border); }
        .border-input { border-color: var(--input-border); }
        .border-primary { border-color: var(--primary); }
        .btn-primary { background-color: var(--primary); color: #fff; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-kill { color: var(--danger); }
        .btn-kill:hover { background-color: color-mix(in srgb, var(--danger) 10%, transparent); color: var(--danger-hover); }
    </style>
</head>
<body x-data="appState()" x-cloak>
    <h1 class="text-2xl font-bold border-b border-panel pb-3 mb-6">yaScrcpy Web</h1>

    <!-- Action Buttons -->
    <div class="mb-4">
        <div class="flex gap-2">
            <button @click="showWifiModal = true"
                    class="btn-primary px-3 py-2 rounded text-sm">
                + ADB WiFi
            </button>
            <button @click="showDeviceModal = true"
                    class="bg-panel hover:bg-[#3a3a3a] text-theme px-3 py-2 rounded text-sm border border-input">
                Select Device
            </button>
            <button @click="showOverrideModal = true"
                    class="bg-panel hover:bg-[#3a3a3a] text-theme px-3 py-2 rounded text-sm border border-input">
                Override Config
            </button>
        </div>
    </div>

    <!-- Running Sessions -->
    <div class="mb-4">
        <h2 class="text-base font-semibold text-theme border-b border-panel pb-1 mb-2">Running Sessions</h2>
        <template x-if="!sessions.length">
            <p class="text-theme text-sm">No active sessions.</p>
        </template>
        <div class="sessions-grid">
            <template x-for="s in sessions" :key="s.pid">
                <div class="session-card">
                    <img :src="s.icon_url || '/gui_assets/placeholder.png'" alt=""
                         @error.once="$event.target.src = '/gui_assets/placeholder.png'">
                    <div class="session-card-info">
                        <p class="session-card-name" x-text="s.app_name"></p>
                        <p class="session-card-meta" x-text="'PID: ' + s.pid + ' · ' + (s.session_type || 'app')"></p>
                    </div>
                    <button @click="killSession(s.pid)"
                            class="session-card-kill"
                            title="Kill session">&times;</button>
                </div>
            </template>
        </div>
    </div>

    <hr class="border-gray-700 my-4">

    <!-- Tabs -->
    <div class="tab">
        <button :class="activeTab === 'Apps' ? 'active' : ''" @click="switchTab('Apps')">Apps</button>
        <button :class="activeTab === 'Winlator' ? 'active' : ''" @click="switchTab('Winlator')">Winlator</button>
        <button :class="activeTab === 'Config' ? 'active' : ''" @click="switchTab('Config')">Config</button>
    </div>

    <!-- Apps Tab -->
    <div x-show="activeTab === 'Apps'" x-cloak class="tab-content">
        <template x-if="appsLoading"><p>Loading apps...</p></template>
        <template x-if="!appsLoading && apps.length === 0"><p>No apps found.</p></template>
        <template x-for="section in appSections" :key="section.title || 'qqs'">
            <div class="app-section-wrapper" :class="section.isQuickAccess ? 'quick-access-wrapper' : ''">
                <h2 x-show="!section.isQuickAccess" class="grid-section-title" x-text="section.title"></h2>
                <div class="grid-container">
                    <template x-for="item in section.items" :key="item.pkg_name">
                        <div class="grid-item" @click="launchApp(item.pkg_name, item.name)">
                            <div class="icon-container">
                                <img :src="item.icon ? '/icons/' + item.icon : '/gui_assets/placeholder.png'"
                                     @error.once="$event.target.src = '/gui_assets/placeholder.png'">
                            </div>
                            <span x-text="item.name"></span>
                        </div>
                    </template>
            </div>
        </div>
    </template>

    <!-- Override Config Modal -->
    <template x-teleport="body">
        <div x-show="showOverrideModal"
             class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
             @click.self="showOverrideModal = false">
            <div class="bg-panel border border-input rounded-lg p-6 w-full max-w-md shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-theme m-0">Override Config</h2>
                    <button @click="showOverrideModal = false" class="text-muted hover:text-theme text-2xl leading-none">&times;</button>
                </div>
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" x-model="neverTurnScreenOff"
                           class="w-5 h-5 accent-[var(--primary)]">
                    <span class="text-theme text-sm">Never Turn Screen Off</span>
                </label>
                <p class="text-xs text-muted mt-2">When enabled, the screen will never be turned off during scrcpy sessions, regardless of app or global configuration.</p>
            </div>
        </div>
    </template>
    </div>

    <!-- Winlator Tab -->
    <div x-show="activeTab === 'Winlator'" x-cloak class="tab-content tab-content-pad">
        <template x-if="winlatorLoading"><p>Loading Winlator games...</p></template>
        <template x-if="!winlatorLoading && winlatorApps.length === 0"><p>No Winlator games found.</p></template>
        <div class="grid-container">
            <template x-for="item in winlatorApps" :key="item.path">
                <div class="grid-item" @click="launchWinlatorApp(item)">
                    <div class="icon-container">
                        <img :src="item.icon ? '/icons/' + item.icon : '/gui_assets/winlator_placeholder.png'"
                             @error.once="$event.target.src = '/gui_assets/winlator_placeholder.png'">
                    </div>
                    <span x-text="item.name"></span>
                </div>
            </template>
        </div>
    </div>

    <!-- Config Tab -->
    <div x-show="activeTab === 'Config'" x-cloak class="tab-content tab-content-pad"
         style="display: flex; flex-wrap: wrap; gap: 20px; width: 100%;">
        <template x-if="configLoading || !configData"><p>Loading configuration...</p></template>
        <template x-if="!configLoading && configData">
            <form @submit.prevent style="display: contents;">
                <!-- Profile selector -->
                <div class="config-group" style="width: 100%;">
                    <h3>Configuration Profile</h3>
                    <div class="config-item">
                        <label for="profile_combo">Profile</label>
                        <select id="profile_combo" x-model="selectedProfile" @change="loadProfileConfig()">
                            <option value="__global__">Global Config</option>
                            <template x-for="group in configProfileGroups" :key="group.label">
                                <optgroup :label="group.label">
                                    <template x-for="p in group.items" :key="p.key">
                                        <option :value="p.key" x-text="p.name"></option>
                                    </template>
                                </optgroup>
                            </template>
                        </select>
                    </div>
                </div>

                <!-- General Settings -->
                <div class="config-group">
                    <h3>General Settings</h3>
                    <div class="config-item"><label for="windowing_mode">Window Mode</label><select id="windowing_mode" x-model="configData.windowing_mode" @change="saveConfigDelayed('windowing_mode')"><option>Fullscreen</option><option>Freeform</option></select></div>
                    <div class="config-item"><label for="mouse_mode">Mouse Mode</label><select id="mouse_mode" x-model="configData.mouse_mode" @change="saveConfigDelayed('mouse_mode')"><option>sdk</option><option>uhid</option><option>aoa</option></select></div>
                    <div class="config-item"><label for="gamepad_mode">Gamepad Mode</label><select id="gamepad_mode" x-model="configData.gamepad_mode" @change="saveConfigDelayed('gamepad_mode')"><option>disabled</option><option>uhid</option><option>aoa</option></select></div>
                    <div class="config-item"><label for="keyboard_mode">Keyboard Mode</label><select id="keyboard_mode" x-model="configData.keyboard_mode" @change="saveConfigDelayed('keyboard_mode')"><option>disabled</option><option>sdk</option><option>uhid</option><option>aoa</option></select></div>
                    <div class="config-item"><label for="mouse_bind">Mouse Bind</label><input list="mouse_bind_opts" id="mouse_bind" x-model="configData.mouse_bind" @change="saveConfigDelayed('mouse_bind')" style="min-width:120px"><datalist id="mouse_bind_opts"><option value="bhsn:++++"><option value="++++:bhsn"></datalist></div>
                    <div class="config-item"><label for="max_fps">Max FPS</label><input list="max_fps_opts" id="max_fps" type="number" x-model="configData.max_fps" @change="saveConfigDelayed('max_fps')"><datalist id="max_fps_opts"><option value="20"><option value="25"><option value="30"><option value="45"><option value="60"></datalist></div>
                    <div class="config-item"><label for="new_display">Virtual Display</label><input list="new_display_opts" id="new_display" x-model="configData.new_display" @change="saveConfigDelayed('new_display')" style="min-width:150px"><datalist id="new_display_opts"><option value="Disabled"><option value="640x360/120"><option value="854x480/120"><option value="960x550/120"><option value="1280x720/140"><option value="1366x768/140"><option value="1920x1080/140"></datalist></div>
                    <div class="config-item"><label for="max_size">Max Size</label><input list="max_size_opts" id="max_size" type="number" x-model="configData.max_size" @change="saveConfigDelayed('max_size')"><datalist id="max_size_opts"><option value="0"><option value="640"><option value="854"><option value="960"><option value="1280"><option value="1366"><option value="1080"></datalist></div>
                    <div class="config-item"><label for="extraargs">Extra Args</label><input id="extraargs" type="text" x-model="configData.extraargs" @change="saveConfigDelayed('extraargs')"></div>
                </div>

                <!-- Video Settings -->
                <div class="config-group">
                    <h3>Video Settings</h3>
                    <div class="config-item"><label for="video_codec">Video Codec</label><select id="video_codec" x-model="configData.video_codec" @change="updateCodec('video'); saveConfigDelayed('video_codec')"><option value="Auto">Auto</option><template x-for="opt in videoCodecOptions" :key="opt.value"><option :value="opt.value" x-text="opt.text"></option></template></select></div>
                    <div class="config-item"><label for="video_encoder">Video Encoder</label><select id="video_encoder" x-model="configData.video_encoder" @change="saveConfigDelayed('video_encoder')"><option value="Auto">Auto</option><template x-for="opt in encoderOptions('video')" :key="opt"><option :value="opt" x-text="opt"></option></template></select></div>
                    <div class="config-item"><label for="render_driver">Render Driver</label><select id="render_driver" x-model="configData.render_driver" @change="saveConfigDelayed('render_driver')"><option>opengles2</option><option>opengles</option><option>opengl</option><option>direct3d</option><option>metal</option><option>software</option></select></div>
                    <div class="config-item"><label for="color_range">Color Range</label><select id="color_range" x-model="configData.color_range" @change="saveConfigDelayed('color_range')"><option>Auto</option><option>Full</option><option>Limited</option></select></div>
                    <div class="config-item"><label for="allow_frame_drop">Frame Drop</label><select id="allow_frame_drop" x-model="configData.allow_frame_drop" @change="saveConfigDelayed('allow_frame_drop')"><option>Enabled</option><option>Disabled</option></select></div>
                    <div class="config-item"><label for="low_latency">Low Latency</label><select id="low_latency" x-model="configData.low_latency" @change="saveConfigDelayed('low_latency')"><option>Enabled</option><option>Disabled</option></select></div>
                    <div class="config-item"><label for="priority_mode">Priority</label><select id="priority_mode" x-model="configData.priority_mode" @change="saveConfigDelayed('priority_mode')"><option>Realtime</option><option>Normal</option></select></div>
                    <div class="config-item"><label for="bitrate_mode">Bitrate Mode</label><select id="bitrate_mode" x-model="configData.bitrate_mode" @change="saveConfigDelayed('bitrate_mode')"><option>Constant</option><option>Variable</option></select></div>
                    <div class="config-item"><label for="iframe_interval">I-frame Interval</label><input id="iframe_interval" type="number" placeholder="0 for Auto" x-model="configData.iframe_interval" @change="saveConfigDelayed('iframe_interval')"></div>
                    <div class="config-item"><label for="video_buffer">Video Buffer</label><input id="video_buffer" type="number" x-model="configData.video_buffer" @change="saveConfigDelayed('video_buffer')"></div>
                    <div class="config-item"><label for="video_bitrate_slider">Video Bitrate</label><input id="video_bitrate_slider" type="number" x-model="configData.video_bitrate_slider" @change="saveConfigDelayed('video_bitrate_slider')"></div>
                </div>

                <!-- Audio Settings -->
                <div class="config-group">
                    <h3>Audio Settings</h3>
                    <div class="config-item"><label for="audio_codec">Audio Codec</label><select id="audio_codec" x-model="configData.audio_codec" @change="updateCodec('audio'); saveConfigDelayed('audio_codec')"><option value="Auto">Auto</option><template x-for="opt in audioCodecOptions" :key="opt.value"><option :value="opt.value" x-text="opt.text"></option></template></select></div>
                    <div class="config-item"><label for="audio_encoder">Audio Encoder</label><select id="audio_encoder" x-model="configData.audio_encoder" @change="saveConfigDelayed('audio_encoder')"><option value="Auto">Auto</option><template x-for="opt in encoderOptions('audio')" :key="opt"><option :value="opt" x-text="opt"></option></template></select></div>
                    <div class="config-item"><label for="audio_buffer">Audio Buffer</label><input id="audio_buffer" type="number" x-model="configData.audio_buffer" @change="saveConfigDelayed('audio_buffer')"></div>
                    <div class="config-item"><label for="audio_bitrate_slider">Audio Bitrate</label><input id="audio_bitrate_slider" type="number" x-model="configData.audio_bitrate_slider" @change="saveConfigDelayed('audio_bitrate_slider')"></div>
                </div>

                <!-- Options -->
                <div class="config-group">
                    <h3>Options</h3>
                    <div class="config-options-grid">
                        <label><input type="checkbox" x-model="configData.fullscreen" @change="saveConfigDelayed('fullscreen')"><span>Fullscreen</span></label>
                        <label><input type="checkbox" x-model="configData.turn_screen_off" @change="saveConfigDelayed('turn_screen_off')"><span>Turn Screen Off</span></label>
                        <label><input type="checkbox" x-model="configData.stay_awake" @change="saveConfigDelayed('stay_awake')"><span>Stay Awake</span></label>
                        <label><input type="checkbox" x-model="configData.mipmaps" @change="saveConfigDelayed('mipmaps')"><span>Mipmaps</span></label>
                        <label><input type="checkbox" x-model="configData.no_audio" @change="saveConfigDelayed('no_audio')"><span>No Audio</span></label>
                        <label><input type="checkbox" x-model="configData.no_video" @change="saveConfigDelayed('no_video')"><span>No Video</span></label>
                        <label><input type="checkbox" x-model="configData.try_unlock" @change="saveConfigDelayed('try_unlock')"><span>Unlock Device</span></label>
                        <label><input type="checkbox" x-model="configData.force_adb_forward" @change="saveConfigDelayed('force_adb_forward')"><span>Force ADB Forward</span></label>
                        <label><input type="checkbox" x-model="configData.alternate_launch_method" @change="saveConfigDelayed('alternate_launch_method')"><span>Alternate Launch Method</span></label>
                    </div>
                </div>
            </form>
        </template>
    </div>

    <!-- WiFi Modal -->
    <template x-teleport="body">
        <div x-show="showWifiModal"
             class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
             @click.self="showWifiModal = false">
            <div class="bg-panel border border-input rounded-lg p-6 w-full max-w-md shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-theme m-0">ADB WiFi Connect</h2>
                    <button @click="showWifiModal = false" class="text-muted hover:text-theme text-2xl leading-none">&times;</button>
                </div>
                <input type="text" x-model="wifiAddress" placeholder="IP:Port"
                       class="w-full px-3 py-2 rounded bg-input text-theme border border-input mb-4">
                <button @click="connectWifi()"
                        class="w-full btn-primary py-2 rounded font-medium">
                    Connect
                </button>
                <p x-text="wifiStatus" class="mt-3 text-sm"
                   :class="wifiOk ? 'text-green-400' : 'text-danger'"></p>
            </div>
        </div>
    </template>

    <!-- Device Selector Modal -->
    <template x-teleport="body">
        <div x-show="showDeviceModal"
             class="fixed inset-0 z-50 flex items-center justify-center bg-black/70"
             @click.self="showDeviceModal = false">
            <div class="bg-panel border border-input rounded-lg p-6 w-full max-w-md shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-theme m-0">Select Device</h2>
                    <button @click="showDeviceModal = false" class="text-muted hover:text-theme text-2xl leading-none">&times;</button>
                </div>
                <template x-if="!devices.length">
                    <p class="text-muted text-sm">No devices found.</p>
                </template>
                <template x-for="d in devices" :key="d.id">
                    <div @click="selectDevice(d.id); showDeviceModal = false"
                         :class="selectedId === d.id
                            ? 'bg-primary text-white'
                            : 'bg-input text-theme hover:bg-panel'"
                         class="flex items-center justify-between px-4 py-3 mt-1 rounded cursor-pointer border border-panel">
                        <div>
                            <p class="text-sm font-medium" x-text="d.name"></p>
                            <p class="text-xs text-muted" x-text="d.id"></p>
                        </div>
                        <span class="text-xs text-muted" x-text="'🔋 ' + (d.battery || '?')"></span>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <script>
        const API_TOKEN = "{{API_TOKEN}}";

        async function authorizedFetch(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${API_TOKEN}`,
                'Content-Type': 'application/json'
            };
            return await fetch(url, options);
        }

        function appState() {
            return {
                // ---- State ----
                devices: [],
                selectedId: null,
                activeTab: 'Apps',

                apps: [],
                appsLoading: false,
                _appsCache: {},
                folders: [],
                _foldersCache: {},

                winlatorApps: [],
                winlatorLoading: false,
                _winlatorCache: {},

                // Modals
                showWifiModal: false,
                showDeviceModal: false,
                wifiAddress: '',
                wifiStatus: '',
                wifiOk: false,

                // Override Config
                showOverrideModal: false,
                neverTurnScreenOff: localStorage.getItem('never_turn_screen_off') === 'true',

                // Config
                configLoading: false,
                selectedProfile: '__global__',
                configData: null,
                videoEncoders: {},
                audioEncoders: {},
                configProfiles: [],

                // ---- Init ----
                async init() {
                    await this.fetchDevices();
                    this.fetchSessions();
                    this._sessionTimer = setInterval(() => this.fetchSessions(), 3000);
                    this.$watch('neverTurnScreenOff', val => {
                        localStorage.setItem('never_turn_screen_off', val);
                    });
                },

                // ---- Sessions ----
                sessions: [],
                showDeviceModal: false,
                _sessionTimer: null,

                async fetchSessions() {
                    try {
                        const res = await authorizedFetch('/api/scrcpy/sessions');
                        this.sessions = await res.json();
                    } catch { this.sessions = []; }
                },

                async killSession(pid) {
                    try {
                        await authorizedFetch(`/api/scrcpy/sessions/${pid}`, { method: 'DELETE' });
                        this.sessions = this.sessions.filter(s => s.pid !== pid);
                    } catch { /* ignore */ }
                },

                // ---- Device ----
                async fetchDevices() {
                    try {
                        const res = await authorizedFetch('/api/devices');
                        this.devices = await res.json();
                        if (this.devices.length > 0) this.selectDevice(this.devices[0].id);
                    } catch { this.devices = []; }
                },

                selectDevice(id) {
                    this.selectedId = id;
                    const tab = this.activeTab;
                    if (tab === 'Apps') this.fetchApps();
                    else if (tab === 'Winlator') this.fetchWinlatorApps();
                    else if (tab === 'Config') this.loadConfigUI();
                },

                // ---- WiFi ----
                async connectWifi() {
                    if (!this.wifiAddress) { this.wifiStatus = 'Please enter an IP:Port address.'; this.wifiOk = false; return; }
                    this.wifiStatus = 'Connecting...';
                    this.wifiOk = false;
                    try {
                        const res = await authorizedFetch('/api/adb/connect', {
                            method: 'POST',
                            body: JSON.stringify({ address: this.wifiAddress })
                        });
                        const result = await res.json();
                        if (res.ok) {
                            this.wifiStatus = `Success: ${result.message}`;
                            this.wifiOk = true;
                            setTimeout(() => { this.showWifiModal = false; this.fetchDevices(); }, 1000);
                        } else {
                            this.wifiStatus = `Error: ${result.detail || 'Failed to connect.'}`;
                        }
                    } catch { this.wifiStatus = 'An unexpected error occurred.'; }
                },

                // ---- Tab ----
                switchTab(tab) {
                    this.activeTab = tab;
                    if (!this.selectedId) return;
                    if (tab === 'Apps') this.fetchApps();
                    else if (tab === 'Winlator') this.fetchWinlatorApps();
                    else if (tab === 'Config') this.loadConfigUI();
                },

                // ---- Apps ----
                get appSections() {
                    const sections = [];
                    const folderMap = {};
                    const unpinned = [];
                    for (const a of this.apps) {
                        const pinnedVal = a.pinned;
                        if (pinnedVal && typeof pinnedVal === 'string') {
                            const folderNames = pinnedVal.split(',').map(s => s.trim()).filter(Boolean);
                            if (folderNames.length) {
                                for (const f of folderNames) {
                                    if (!folderMap[f]) folderMap[f] = [];
                                    folderMap[f].push(a);
                                }
                                continue;
                            }
                        }
                        unpinned.push(a);
                    }
                    for (const folderName of this.folders) {
                        if (folderMap[folderName]) {
                            folderMap[folderName].sort((a, b) => a.name.localeCompare(b.name));
                            sections.push({ title: folderName, items: folderMap[folderName] });
                            delete folderMap[folderName];
                        }
                    }
                    const remaining = Object.keys(folderMap).sort((a, b) => a.localeCompare(b));
                    for (const name of remaining) {
                        folderMap[name].sort((a, b) => a.name.localeCompare(b.name));
                        sections.push({ title: name, items: folderMap[name] });
                    }
                    if (unpinned.length) {
                        unpinned.sort((a, b) => a.name.localeCompare(b.name));
                        sections.push({ title: 'All Apps', items: unpinned });
                    }
                    // Extract qqs section and put it first, unstyled
                    const qqsIdx = sections.findIndex(s => s.title === 'qqs');
                    let qqsSection = null;
                    if (qqsIdx >= 0) {
                        qqsSection = sections.splice(qqsIdx, 1)[0];
                        qqsSection.isQuickAccess = true;
                        qqsSection.title = '';
                    }
                    if (qqsSection) sections.unshift(qqsSection);
                    return sections;
                },

                async fetchApps() {
                    if (!this.selectedId) return;
                    this.appsLoading = true;
                    if (this._appsCache[this.selectedId]) {
                        this.apps = this._appsCache[this.selectedId];
                        this.folders = this._foldersCache[this.selectedId] || [];
                        this.appsLoading = false;
                        return;
                    }
                    try {
                        const [appsRes, foldersRes] = await Promise.all([
                            authorizedFetch(`/api/apps?device_id=${this.selectedId}&include_system_apps=true`),
                            authorizedFetch(`/api/folders?device_id=${this.selectedId}`)
                        ]);
                        const data = await appsRes.json();
                        if (data.error) throw new Error(data.error);
                        this._appsCache[this.selectedId] = data;
                        this.apps = data;
                        const folderData = await foldersRes.json();
                        this._foldersCache[this.selectedId] = folderData.folders || [];
                        this.folders = folderData.folders || [];
                    } catch { this.apps = []; this.folders = []; }
                    this.appsLoading = false;
                },

                async launchApp(pkgName, appName) {
                    if (!this.selectedId) return;
                    try {
                        await authorizedFetch('/api/launch', {
                            method: 'POST',
                            body: JSON.stringify({
                                device_id: this.selectedId,
                                pkg_name: pkgName,
                                app_name: appName,
                                never_turn_screen_off: this.neverTurnScreenOff
                            })
                        });
                    } catch { /* ignore */ }
                },

                // ---- Winlator ----
                async fetchWinlatorApps() {
                    if (!this.selectedId) return;
                    this.winlatorLoading = true;
                    if (this._winlatorCache[this.selectedId]) {
                        this.winlatorApps = this._winlatorCache[this.selectedId];
                        this.winlatorLoading = false;
                        return;
                    }
                    try {
                        const res = await authorizedFetch(`/api/winlator/apps?device_id=${this.selectedId}`);
                        const data = await res.json();
                        if (data.error) throw new Error(data.error);
                        this._winlatorCache[this.selectedId] = data;
                        this.winlatorApps = data;
                    } catch { this.winlatorApps = []; }
                    this.winlatorLoading = false;
                },

                async launchWinlatorApp(item) {
                    if (!this.selectedId) return;
                    try {
                        await authorizedFetch('/api/winlator/launch', {
                            method: 'POST',
                            body: JSON.stringify({
                                device_id: this.selectedId,
                                shortcut_path: item.path,
                                app_name: item.name,
                                pkg_name: item.pkg,
                                never_turn_screen_off: this.neverTurnScreenOff
                            })
                        });
                    } catch { /* ignore */ }
                },

                // ---- Config ----
                safe_btoa(str) {
                    return btoa(unescape(encodeURIComponent(str)));
                },

                get configProfileGroups() {
                    const groups = [];
                    const apps = (this.configProfiles.apps || []).sort((a, b) => a.name.localeCompare(b.name));
                    const winlator = (this.configProfiles.winlator || []).sort((a, b) => a.name.localeCompare(b.name));
                    if (apps.length) groups.push({ label: 'Apps', items: apps });
                    if (winlator.length) groups.push({ label: 'Winlator', items: winlator });
                    return groups;
                },

                async loadConfigUI() {
                    if (!this.selectedId) return;
                    this.configLoading = true;
                    this.configData = null;
                    try {
                        const [profilesRes, encodersRes] = await Promise.all([
                            authorizedFetch(`/api/profiles?device_id=${this.selectedId}`),
                            authorizedFetch(`/api/scrcpy/encoders?device_id=${this.selectedId}`)
                        ]);
                        this.configProfiles = await profilesRes.json();
                        const encoders = await encodersRes.json();
                        this.videoEncoders = encoders.video_encoders || {};
                        this.audioEncoders = encoders.audio_encoders || {};
                        this.selectedProfile = '__global__';
                        await this.loadProfileConfig();
                    } catch { /* ignore */ }
                    this.configLoading = false;
                },

                async loadProfileConfig() {
                    if (!this.selectedId) return;
                    const key = this.selectedProfile;
                    let params = `device_id=${this.selectedId}`;
                    if (key === '__global__') {
                        params += '&profile_key=placeholder';
                    } else if (key.includes('/')) {
                        params += `&profile_key=${this.safe_btoa(key)}&b64=true`;
                    } else {
                        params += `&profile_key=${encodeURIComponent(key)}`;
                    }
                    try {
                        const res = await authorizedFetch(`/api/config?${params}`);
                        this.configData = await res.json();
                    } catch { this.configData = null; }
                },

                async saveConfigDelayed(key) {
                    clearTimeout(this._saveTimer);
                    this._saveTimer = setTimeout(() => this.saveConfig(), 300);
                },

                async saveConfig() {
                    const profileKey = this.selectedProfile;
                    if (!profileKey) return;
                    const data = {};
                    for (const k in this.configData) {
                        data[k] = this.configData[k];
                    }
                    await authorizedFetch('/api/config', {
                        method: 'POST',
                        body: JSON.stringify({
                            device_id: this.selectedId,
                            pkg_name: profileKey,
                            config_data: data
                        })
                    });
                },

                updateCodec(type) {
                    // Force encoder options to recompute by touching a reactive prop
                    this._codecVersion = (this._codecVersion || 0) + 1;
                    this.saveConfigDelayed(type + '_codec');
                },

                encoderOptions(type) {
                    // Read _codecVersion just to make this reactive on codec changes
                    void this._codecVersion;
                    const codecMap = type === 'video' ? this.videoEncoders : this.audioEncoders;
                    const selectedCodec = this.configData[type + '_codec'] || 'Auto';
                    if (selectedCodec === 'Auto' || !selectedCodec.includes(' - ')) return [];
                    const parts = selectedCodec.split(' - ');
                    if (parts.length !== 2) return [];
                    const mode = parts[0].trim().toLowerCase();
                    const codec = parts[1].trim();
                    if (!codecMap[codec]) return [];
                    const filtered = codecMap[codec].filter(e => e[1] === mode);
                    return [...new Set(filtered.map(e => e[0]))].sort().map(n => `${n} (${mode})`);
                },

                // ---- Codec options (reactive getters) ----
                get videoCodecOptions() {
                    const opts = [];
                    if (this.videoEncoders) {
                        for (const codec of Object.keys(this.videoEncoders).sort()) {
                            const modes = [...new Set(this.videoEncoders[codec].map(e => e[1]))].sort();
                            for (const mode of modes)
                                opts.push({ value: `${mode.toUpperCase()} - ${codec}`, text: `${mode.toUpperCase()} - ${codec}` });
                        }
                    }
                    return opts;
                },

                get audioCodecOptions() {
                    const opts = [];
                    if (this.audioEncoders) {
                        for (const codec of Object.keys(this.audioEncoders).sort()) {
                            const modes = [...new Set(this.audioEncoders[codec].map(e => e[1]))].sort();
                            for (const mode of modes)
                                opts.push({ value: `${mode.toUpperCase()} - ${codec}`, text: `${mode.toUpperCase()} - ${codec}` });
                        }
                    }
                    return opts;
                }
            };
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
